name: Publish (snapshots on main, releases on tags)

on:
  push:
    branches: ["master", "main"]
    tags:
      - "[0-9]*" # parte su tag che iniziano con un numero (poi validiamo X.Y.Z nel job)
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  id-token: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache OWASP Dependency-Check DB
        id: owasp-cache
        uses: actions/cache@v5
        with:
          path: .dependency-check/data
          key: ${{ runner.os }}-owasp-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-owasp-
          save-always: true

      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USER: ${{ vars.OSS_INDEX_USER }}
          OSS_INDEX_PASSWORD: ${{ secrets.OSS_INDEX_PASSWORD }}
          # Se la cache Ă¨ esatta (stessa giornata) skippa l'update NVD
          NOUPDATE_FLAG: ${{ steps.owasp-cache.outputs.cache-hit == 'true' && '-DautoUpdate=false' || '' }}
        run: |
          mvn -B dependency-check:check \
            -DdataDirectory=.dependency-check/data \
            -DnvdApiKey=$NVD_API_KEY \
            -DossindexAnalyzerUsername=$OSS_INDEX_USER \
            -DossindexAnalyzerPassword=$OSS_INDEX_PASSWORD \
            $NOUPDATE_FLAG

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 30

  # â”€â”€ OSV Scan (reusable workflow) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  osv-scan:
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || vars.FORCE_OSV_JOB == 'true') }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5"
    with:
      matrix-property: 'be-'
      fail-on-vuln: ${{ github.ref_name == 'main' || github.ref_type == 'tag' }}
      scan-args: |-
        -r
        .
        --lockfile
        ./pom.xml
        --allow-no-lockfiles

  # â”€â”€ Deploy SNAPSHOT su Maven Central (solo push su main) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  snapshot-on-main:
    needs: [ dependency-check, osv-scan ]
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java + Maven settings
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central-snapshots
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN

      - name: Verify required secrets
        env:
          CENTRAL_USERNAME: ${{ vars.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        run: |
          MISSING=()
          [ -z "$CENTRAL_USERNAME" ] && MISSING+=("CENTRAL_USERNAME")
          [ -z "$CENTRAL_TOKEN" ] && MISSING+=("CENTRAL_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Read project version
        id: version
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Deploy SNAPSHOT to Sonatype snapshots
        if: endsWith(steps.version.outputs.version, '-SNAPSHOT')
        env:
          CENTRAL_USERNAME: ${{ vars.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        run: mvn -B -DskipTests deploy

      - name: Skip (not a SNAPSHOT)
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: echo "Version is stable -> no publish on main."

  release-on-tag:
    needs: [ dependency-check, osv-scan ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Validate tag format (must be X.Y.Z)
        run: |
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Not a release tag (expected X.Y.Z). Aborting."
            exit 1
          fi

      - name: Set up Java + Maven settings + GPG
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify required secrets
        env:
          CENTRAL_USERNAME: ${{ vars.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          MISSING=()
          [ -z "$CENTRAL_USERNAME" ] && MISSING+=("CENTRAL_USERNAME")
          [ -z "$CENTRAL_TOKEN" ] && MISSING+=("CENTRAL_TOKEN")
          [ -z "$GPG_PRIVATE_KEY" ] && MISSING+=("GPG_PRIVATE_KEY")
          [ -z "$GPG_PASSPHRASE" ] && MISSING+=("GPG_PASSPHRASE")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Read project version
        id: version
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Fail if POM is SNAPSHOT on a tag
        if: endsWith(steps.version.outputs.version, '-SNAPSHOT')
        run: |
          echo "Refusing to release a -SNAPSHOT version on tag."
          exit 1

      - name: Ensure tag matches POM version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag ($TAG) does not match POM version ($VERSION). Aborting release."
            exit 1
          fi
          echo "OK: tag matches POM version."

      - name: Deploy RELEASE to Maven Central (Central Portal)
        env:
          CENTRAL_USERNAME: ${{ vars.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -DskipTests deploy -Prelease
